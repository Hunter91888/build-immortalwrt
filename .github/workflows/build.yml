name: Build ImmortalWrt

# 允许手动触发编译
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential file git libncurses5-dev libssl-dev python3 python3-dev python3-pip unzip wget zlib1g-dev

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom config
        run: |
          # 加载我们写好的.config
          cat .config > .config
          make defconfig

      - name: Build firmware
        run: |
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-ufi003-ecm-firmware
          path: bin/targets/qualcommax/msm8916/*-sysupgrade.bin
